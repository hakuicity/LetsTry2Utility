<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1565C0">
  <meta name="description" content="Let's Try 2 — 小学4年生英語学習コンパニオン">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Let's Try 2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <title>Let's Try 2 — 練習サイト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F6F8; --surface: #fff; --surface2: #ECEFF1; --border: #e0e0e0;
      --text: #212529; --text2: #607D8B; --text3: #90A4AE; --shadow: rgba(0,0,0,.06);
      --accent: #1565C0; --accent2: #E3F2FD;
    }
    body.dark {
      --bg: #1A1F23; --surface: #263238; --surface2: #2E3B42; --border: #37474F;
      --text: #ECEFF1; --text2: #90A4AE; --text3: #546E7A; --shadow: rgba(0,0,0,.3);
      --accent2: #1A2F3E;
    }

    html, body { height: 100%; }
    body { font-family: 'Noto Sans JP', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }

    .main-col { padding: 14px 14px 60px; max-width: 640px; margin: 0 auto; }

    /* ── Header ── */
    .header { text-align: center; padding: 18px 0 12px; }
    .header-icon { display: inline-block; color: #fff; border-radius: 10px; padding: 7px 18px; font-size: 20px; font-weight: 800; letter-spacing: 2px; margin-bottom: 6px; background: #1565C0; }
    .header h1 { font-size: 23px; font-weight: 800; margin: 5px 0 0; }
    .header p { font-size: 13px; color: var(--text3); margin: 3px 0 0; }

    .top-controls { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 12px; }
    .theme-btn { padding: 8px 11px; border-radius: 8px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; font-size: 16px; color: var(--text2); transition: all .15s; }
    .theme-btn:hover { border-color: var(--text2); }

    /* ── Unit tabs ── */
    .unit-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
    .unit-tab {
      flex: 1; min-width: 60px; padding: 8px 4px; text-align: center;
      border: 2px solid var(--border); border-radius: 8px; background: var(--surface);
      cursor: pointer; font-weight: 700; font-size: 12px; color: var(--text2);
      transition: all .15s; font-family: inherit;
    }
    .unit-tab.active { color: #fff; border-color: transparent; background: #1565C0; }
    .unit-tab:hover:not(.active) { border-color: #90CAF9; }

    /* ── Unit banner ── */
    .unit-banner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 2px 6px var(--shadow);
      border-left: 4px solid;
    }
    .unit-banner h2 { font-size: 16px; font-weight: 800; margin-bottom: 3px; }
    .unit-banner p { font-size: 13px; color: var(--text2); }

    /* ── Activity grid ── */
    .act-grid { display: flex; flex-direction: column; gap: 9px; }
    .act-card {
      display: flex; align-items: center; gap: 12px; padding: 13px 15px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left; box-shadow: 0 1px 3px var(--shadow);
      transition: box-shadow .15s, transform .1s; font-family: inherit; color: var(--text); width: 100%;
    }
    .act-card:hover { box-shadow: 0 3px 10px var(--shadow); transform: translateY(-1px); }
    .act-icon { font-size: 26px; flex-shrink: 0; }
    .act-label { font-size: 15px; font-weight: 700; }
    .act-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .act-badge { margin-left: auto; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; flex-shrink: 0; }

    /* ── Section label ── */
    .section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin: 18px 0 8px; }

    /* ── Generic top bar ── */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px;
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .back-btn:hover { border-color: #c62828; color: #c62828; background: #FFF5F5; }
    .progress-text { font-size: 13px; color: var(--text3); }

    /* ── Progress bar ── */
    .progress-wrap { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .progress-bar { height: 100%; border-radius: 3px; transition: width .3s; background: #1565C0; }

    /* ── Question card ── */
    .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; box-shadow: 0 2px 6px var(--shadow); }
    .q-badge { display: inline-block; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 3px 10px; margin-bottom: 8px; background: #E3F2FD; color: #1565C0; }
    .q-text { font-size: 18px; line-height: 1.65; color: var(--text); font-weight: 600; }
    .q-sub { font-size: 14px; color: var(--text2); margin-top: 6px; line-height: 1.5; }

    /* ── Options ── */
    .opts { display: flex; flex-direction: column; gap: 8px; }
    .opt-btn {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      border-radius: 10px; border: 2px solid var(--border); cursor: pointer;
      font-size: 15px; font-weight: 500; text-align: left; background: var(--surface);
      transition: all .15s; font-family: inherit; color: var(--text);
    }
    .opt-btn:hover:not(.locked) { border-color: #90CAF9; background: var(--surface2); }
    .opt-letter {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 7px; background: var(--surface2);
      font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .opt-btn.correct { background: #E8F5E9; border-color: #2E7D32; color: #1B5E20; }
    .opt-btn.wrong   { background: #FFEBEE; border-color: #c62828; color: #b71c1c; }
    .opt-btn.locked  { cursor: default; }

    /* ── Feedback ── */
    .feedback-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
    .fb-text { font-size: 18px; }
    .next-btn {
      padding: 10px 22px; color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
      background: #1565C0; transition: background .15s;
    }
    .next-btn:hover { background: #0D47A1; }

    /* ── Hint box ── */
    .hint-box { background: #FFF8E1; border: 1px solid #FFE082; border-radius: 10px; padding: 11px 13px; margin-top: 10px; font-size: 14px; line-height: 1.6; color: #F57F17; }
    body.dark .hint-box { background: #2E2600; border-color: #7C6C00; color: #FFD54F; }

    /* ── Score circle ── */
    .review-header { text-align: center; padding: 20px 0 10px; }
    .score-circle { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 120px; height: 120px; border-radius: 50%; border: 5px solid #1565C0; margin-bottom: 10px; }
    .score-pct { font-size: 31px; font-weight: 800; color: #1565C0; }
    .score-lbl { font-size: 13px; color: var(--text3); }
    .grade-text { font-size: 20px; font-weight: 700; }

    /* ── Result detail ── */
    .result-list { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
    .result-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .result-q { font-size: 13px; font-weight: 600; color: var(--text2); }
    .result-ans { font-size: 14px; margin-top: 3px; }

    /* ── Matching activity ── */
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .match-col { display: flex; flex-direction: column; gap: 8px; }
    .match-item {
      padding: 10px 12px; border-radius: 10px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 15px; font-weight: 600;
      text-align: center; transition: all .15s; font-family: inherit; color: var(--text);
    }
    .match-item:hover:not(.matched):not(.locked) { border-color: #90CAF9; background: var(--surface2); }
    .match-item.selected { border-color: #1565C0; background: #E3F2FD; color: #1565C0; }
    .match-item.matched { border-color: #2E7D32; background: #E8F5E9; color: #1B5E20; cursor: default; }
    .match-item.wrong-flash { border-color: #c62828; background: #FFEBEE; }

    /* ── Word Arrange ── */
    .word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 44px; padding: 8px; background: var(--surface2); border-radius: 10px; }
    .word-chip {
      padding: 8px 14px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 15px; font-weight: 600;
      transition: all .15s; font-family: inherit; color: var(--text);
    }
    .word-chip:hover { border-color: #1565C0; background: var(--accent2); }
    .word-chip.used { opacity: 0.3; cursor: default; pointer-events: none; }
    .answer-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px; padding: 8px; background: var(--surface); border: 2px dashed var(--border); border-radius: 10px; margin-bottom: 10px; align-items: center; }
    .answer-row[data-empty="true"]::before { content: "単語をタップして並べよう"; color: var(--text3); font-size: 14px; font-style: italic; }
    .answer-chip {
      padding: 8px 14px; border-radius: 8px; border: 2px solid #1565C0;
      background: var(--accent2); cursor: pointer; font-size: 15px; font-weight: 600;
      color: var(--text); font-family: inherit;
    }
    .answer-chip:hover { background: #BBDEFB; }

    /* ── Primary / action btns ── */
    .primary-btn {
      display: block; width: 100%; padding: 13px; background: #37474F; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 14px; font-family: inherit; transition: background .15s;
    }
    .primary-btn:hover { background: #263238; }
    .primary-btn.blue { background: #1565C0; }
    .primary-btn.blue:hover { background: #0D47A1; }
    .check-btn {
      display: block; width: 100%; padding: 13px; background: #1565C0; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 10px; font-family: inherit; transition: background .15s;
    }
    .check-btn:hover { background: #0D47A1; }
    .check-btn:disabled { background: var(--border); color: var(--text3); cursor: default; }

    /* ── Flashcard ── */
    .flashcard-wrap { perspective: 1000px; margin: 20px auto; max-width: 400px; }
    .flashcard {
      width: 100%; height: 180px; position: relative; transform-style: preserve-3d;
      transition: transform .5s; cursor: pointer; border-radius: 16px;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .fc-face {
      position: absolute; inset: 0; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      backface-visibility: hidden; padding: 20px;
      border: 2px solid var(--border); box-shadow: 0 4px 16px var(--shadow);
    }
    .fc-front { background: var(--surface); }
    .fc-back  { background: #E3F2FD; transform: rotateY(180deg); }
    body.dark .fc-back { background: #1A2F3E; }
    .fc-emoji { font-size: 42px; margin-bottom: 8px; }
    .fc-word  { font-size: 22px; font-weight: 800; color: var(--text); }
    .fc-hint  { font-size: 13px; color: var(--text3); margin-top: 4px; }
    .fc-translation { font-size: 20px; font-weight: 700; color: #1565C0; }
    .fc-nav { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 12px; }
    .fc-nav-btn {
      padding: 8px 18px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 600;
      font-family: inherit; color: var(--text2); transition: all .15s;
    }
    .fc-nav-btn:hover { border-color: #1565C0; color: #1565C0; }
    .fc-counter { font-size: 14px; color: var(--text3); min-width: 60px; text-align: center; }

    /* ── Chant / Listening ── */
    .chant-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 6px var(--shadow); }
    .chant-title { font-size: 14px; font-weight: 700; color: #1565C0; margin-bottom: 10px; }
    .chant-line { font-size: 16px; line-height: 1.8; color: var(--text); }
    .chant-line.highlight { color: #1565C0; font-weight: 700; }
    .play-btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
      border-radius: 8px; border: 2px solid var(--border); background: var(--surface);
      cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit;
      color: var(--text2); transition: all .15s; margin-top: 8px;
    }
    .play-btn:hover { border-color: #1565C0; color: #1565C0; }

    /* ── Day-of-week wheel ── */
    .days-wheel { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .day-pill {
      padding: 10px 14px; border-radius: 20px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 700;
      font-family: inherit; color: var(--text); transition: all .15s;
    }
    .day-pill.active { color: #fff; border-color: transparent; }

    /* ── Clock activity ── */
    .clock-svg { display: block; margin: 0 auto 14px; }
    .time-display { text-align: center; font-size: 32px; font-weight: 800; color: #1565C0; margin-bottom: 8px; }

    /* ── Weather icons ── */
    .weather-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 14px 0; }
    .weather-card {
      display: flex; flex-direction: column; align-items: center; padding: 12px 6px;
      border-radius: 12px; border: 2px solid var(--border); background: var(--surface);
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .weather-card:hover { border-color: #90CAF9; transform: translateY(-2px); }
    .weather-card.selected { border-color: #1565C0; background: var(--accent2); }
    .weather-icon { font-size: 32px; margin-bottom: 4px; }
    .weather-word { font-size: 12px; font-weight: 700; color: var(--text2); }

    .hidden { display: none !important; }

    /* ── Stat card ── */
    .stat-row { display: flex; gap: 12px; margin-bottom: 14px; }
    .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 1px 3px var(--shadow); }
    .stat-num { font-size: 26px; font-weight: 800; color: #1565C0; }
    .stat-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

    /* ── Footer nav ── */
    .footer-nav { text-align: center; color: var(--text3); font-size: 13px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="main-col" id="app">

  <!-- ══════════════════════════════════════════ HOME ══ -->
  <div id="home-screen">
    <div class="header">
      <div class="header-icon">Let's Try!</div>
      <h1>Let's Try 2 練習</h1>
      <p>Unit 1–9 · 小学校4年生向け · 自主練習ツール</p>
    </div>

    <div class="top-controls">
      <button class="theme-btn" id="theme-btn">🌙</button>
    </div>

    <div class="unit-tabs" id="unit-tabs">
      <button class="unit-tab active" data-unit="0">全</button>
      <button class="unit-tab" data-unit="1">U1</button>
      <button class="unit-tab" data-unit="2">U2</button>
      <button class="unit-tab" data-unit="3">U3</button>
      <button class="unit-tab" data-unit="4">U4</button>
      <button class="unit-tab" data-unit="5">U5</button>
      <button class="unit-tab" data-unit="6">U6</button>
      <button class="unit-tab" data-unit="7">U7</button>
      <button class="unit-tab" data-unit="8">U8</button>
      <button class="unit-tab" data-unit="9">U9</button>
    </div>

    <div id="unit-banner" class="unit-banner hidden">
      <h2 id="banner-title"></h2>
      <p id="banner-sub"></p>
    </div>

    <p class="section-label">🎯 練習メニュー</p>
    <div class="act-grid" id="act-grid"></div>


  </div>

  <!-- ══════════════════════════════════════════ VOCAB QUIZ ══ -->
  <div id="quiz-screen" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="quiz-back">← メニュー</button>
      <span class="progress-text" id="quiz-prog-text"></span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="quiz-prog-bar"></div></div>

    <div class="q-card">
      <span class="q-badge" id="quiz-badge"></span>
      <div class="q-text" id="quiz-q"></div>
      <div class="q-sub" id="quiz-sub"></div>
    </div>

    <div class="opts" id="quiz-opts"></div>

    <div class="hint-box hidden" id="quiz-hint"></div>

    <div class="feedback-row hidden" id="quiz-feedback">
      <span class="fb-text" id="quiz-fb-icon"></span>
      <button class="next-btn" id="quiz-next">次へ →</button>
    </div>
    <div style="text-align:center;font-size:13px;color:var(--text3);margin-top:14px;padding-top:10px;border-top:1px solid var(--border)" id="quiz-run-score"></div>
  </div>

  <!-- ══════════════════════════════════════════ FLASHCARDS ══ -->
  <div id="flash-screen" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="flash-back">← メニュー</button>
      <span class="progress-text" id="flash-prog"></span>
    </div>

    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard">
        <div class="fc-face fc-front">
          <div class="fc-emoji" id="fc-emoji"></div>
          <div class="fc-word" id="fc-word"></div>
          <div class="fc-hint">タップして日本語を見る</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-word" id="fc-word-back"></div>
          <div class="fc-translation" id="fc-trans"></div>
        </div>
      </div>
    </div>

    <div class="fc-nav">
      <button class="fc-nav-btn" id="fc-prev">← 前</button>
      <span class="fc-counter" id="fc-counter"></span>
      <button class="fc-nav-btn" id="fc-next">次 →</button>
    </div>
    <button class="primary-btn blue" id="fc-shuffle" style="margin-top:16px">🔀 シャッフル</button>
  </div>

  <!-- ══════════════════════════════════════════ MATCHING ══ -->
  <div id="match-screen" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="match-back">← メニュー</button>
      <span class="progress-text" id="match-score-text"></span>
    </div>
    <div class="q-card" style="margin-bottom:10px">
      <div class="q-text" id="match-instructions" style="font-size:15px;"></div>
    </div>
    <div class="match-grid">
      <div class="match-col" id="match-left"></div>
      <div class="match-col" id="match-right"></div>
    </div>
    <div class="hint-box hidden" id="match-result"></div>
    <button class="primary-btn blue hidden" id="match-next-round">次のラウンド →</button>
  </div>

  <!-- ══════════════════════════════════════════ SENTENCE BUILD ══ -->
  <div id="build-screen" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="build-back">← メニュー</button>
      <span class="progress-text" id="build-prog"></span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="build-prog-bar"></div></div>

    <div class="q-card">
      <span class="q-badge">文を作ろう</span>
      <div class="q-text" id="build-prompt" style="font-size:15px;color:var(--text2);font-weight:400;margin-bottom:6px;"></div>
      <div class="q-text" id="build-jp" style="font-size:16px;"></div>
    </div>

    <div class="answer-row" id="build-answer" data-empty="true"></div>

    <div class="word-bank" id="build-bank"></div>

    <div class="hint-box hidden" id="build-hint"></div>

    <button class="check-btn" id="build-check" disabled>答え合わせ</button>

    <div class="feedback-row hidden" id="build-feedback">
      <span class="fb-text" id="build-fb-icon"></span>
      <button class="next-btn" id="build-next">次へ →</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════ REVIEW (results) ══ -->
  <div id="review-screen" class="hidden">
    <div class="review-header">

let matchScore = 0, matchTotal = 0, matchRound = 0;

// Sentence build state
let buildItems = [], buildIdx = 0, buildScore = 0;
let buildAnswer = [], buildBank = [];

// ══════════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════════
const themeBtn = document.getElementById("theme-btn");
const saved = localStorage.getItem("lt2-theme");
if (saved === "dark") document.body.classList.add("dark");
themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
themeBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
  localStorage.setItem("lt2-theme", document.body.classList.contains("dark") ? "dark" : "light");
});

// ══════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════════════════
const screens = ["home-screen","quiz-screen","flash-screen","match-screen","build-screen","review-screen"];
function showScreen(id) {
  screens.forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id));
}

// ══════════════════════════════════════════════════════════
// HOME SCREEN
// ══════════════════════════════════════════════════════════
document.getElementById("unit-tabs").addEventListener("click", e => {
  const tab = e.target.closest(".unit-tab");
  if (!tab) return;
  currentUnit = parseInt(tab.dataset.unit);
  document.querySelectorAll(".unit-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  renderHome();
});

function getUnitsToShow() {
  if (currentUnit === 0) return UNITS.filter(Boolean);
  return [UNITS[currentUnit]].filter(Boolean);
}

function renderHome() {
  const units = getUnitsToShow();
  const banner = document.getElementById("unit-banner");
  const bannerTitle = document.getElementById("banner-title");
  const bannerSub = document.getElementById("banner-sub");

  if (currentUnit !== 0 && units.length) {
    const u = units[0];
    banner.classList.remove("hidden");
    banner.style.borderColor = u.color;
    bannerTitle.textContent = `Unit ${u.id}: ${u.title}`;
    bannerTitle.style.color = u.color;
    bannerSub.textContent = u.titleJp;
  } else {
    banner.classList.add("hidden");
  }

  const grid = document.getElementById("act-grid");
  grid.innerHTML = "";

  if (currentUnit === 0) {
    // Show all activity types across all units
    Object.entries(ACTIVITY_DEFS).forEach(([key, def]) => {
      const btn = document.createElement("button");
      btn.className = "act-card";
      const unitCount = UNITS.filter(Boolean).filter(u => u.activities.includes(key)).length;
      btn.innerHTML = `
        <span class="act-icon">${def.icon}</span>
        <div>
          <div class="act-label">${def.label}</div>
          <div class="act-desc">${def.desc}</div>
        </div>
        <span class="act-badge" style="background:#E3F2FD;color:#1565C0">${unitCount} Units</span>
      `;
      btn.addEventListener("click", () => launchActivity(key, null));
      grid.appendChild(btn);
    });
  } else {
    const u = units[0];
    u.activities.forEach(key => {
      const def = ACTIVITY_DEFS[key];
      const btn = document.createElement("button");
      btn.className = "act-card";
      const count = key === "vocab" ? u.vocab.length :
                    key === "flash" ? u.vocab.length :
                    key === "match" ? Math.floor(u.matchPairs.length/2)*2 :
                    u.sentences.length;
      btn.innerHTML = `
        <span class="act-icon">${def.icon}</span>
        <div>
          <div class="act-label">${def.label}</div>
          <div class="act-desc">${def.desc}</div>
        </div>
        <span class="act-badge" style="background:#E3F2FD;color:#1565C0">${count}問</span>
      `;
      btn.addEventListener("click", () => launchActivity(key, u));
      grid.appendChild(btn);
    });
  }
}

function launchActivity(type, unitData) {
  currentActivity = type;
  currentUnitData = unitData;
  if (type === "vocab")  startQuiz(unitData);
  if (type === "flash")  startFlash(unitData);
  if (type === "match")  startMatch(unitData);
  if (type === "build")  startBuild(unitData);
}

// ══════════════════════════════════════════════════════════
// VOCAB QUIZ
// ══════════════════════════════════════════════════════════
function buildQuizItems(unitData) {
  const allVocab = unitData
    ? unitData.vocab.map(v => ({...v, unit: unitData.id, unitTitle: unitData.title, unitColor: unitData.color}))
    : UNITS.filter(Boolean).flatMap(u => u.vocab.map(v => ({...v, unit: u.id, unitTitle: u.title, unitColor: u.color})));

  return shuffle(allVocab).slice(0, Math.min(15, allVocab.length)).map(item => {
    // Build 4 choices: correct + 3 distractors
    const pool = UNITS.filter(Boolean).flatMap(u => u.vocab).filter(v => v.jp !== item.jp);
    const distractors = shuffle(pool).slice(0, 3).map(v => v.jp);
    const choices = shuffle([item.jp, ...distractors]);
    return { ...item, choices, correct: item.jp };
  });
}

function startQuiz(unitData) {
  qItems = buildQuizItems(unitData);
  qIdx = 0; qScore = 0; qResults = [];
  renderQuizQ();
  showScreen("quiz-screen");
}

function renderQuizQ() {
  const item = qItems[qIdx];
  const total = qItems.length;
  document.getElementById("quiz-badge").textContent = `Unit ${item.unit} · ${item.unitTitle}`;
  document.getElementById("quiz-badge").style.background = item.unitColor + "22";
  document.getElementById("quiz-badge").style.color = item.unitColor;
  document.getElementById("quiz-q").textContent = `${item.emoji}  ${item.en}`;
  document.getElementById("quiz-sub").textContent = item.hint;
  document.getElementById("quiz-prog-text").textContent = `${qIdx + 1} / ${total}`;
  document.getElementById("quiz-prog-bar").style.width = `${((qIdx) / total) * 100}%`;
  document.getElementById("quiz-hint").classList.add("hidden");
  document.getElementById("quiz-feedback").classList.add("hidden");
  document.getElementById("quiz-run-score").textContent = `現在の成績: ${qScore} / ${qIdx}`;

  const opts = document.getElementById("quiz-opts");
  opts.innerHTML = "";
  const letters = ["A","B","C","D"];
  item.choices.forEach((ch, i) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span> ${ch}`;
    btn.addEventListener("click", () => chooseQuizOpt(btn, ch, item));
    opts.appendChild(btn);
  });
}

function chooseQuizOpt(btn, choice, item) {
  const correct = choice === item.correct;
  document.querySelectorAll(".opt-btn").forEach(b => {
    b.classList.add("locked");
    if (b.textContent.trim().includes(item.correct)) b.classList.add("correct");
  });
  if (!correct) btn.classList.add("wrong");
  if (correct) qScore++;
  qResults.push({ item, correct, chosen: choice });
  document.getElementById("quiz-hint").textContent = `💡 ${item.hint}`;
  document.getElementById("quiz-hint").classList.remove("hidden");
  document.getElementById("quiz-fb-icon").textContent = correct ? "⭕ 正解！" : "❌ 不正解";
  document.getElementById("quiz-feedback").classList.remove("hidden");
}

document.getElementById("quiz-next").addEventListener("click", () => {
  qIdx++;
  if (qIdx >= qItems.length) showReview("quiz");
  else renderQuizQ();
});
document.getElementById("quiz-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// FLASHCARDS
// ══════════════════════════════════════════════════════════
function startFlash(unitData) {
  fcItems = unitData
    ? [...unitData.vocab]
    : shuffle(UNITS.filter(Boolean).flatMap(u => u.vocab));
  fcIdx = 0;
  renderFlash();
  showScreen("flash-screen");
}

function renderFlash() {
  const card = document.getElementById("flashcard");
  card.classList.remove("flipped");
  const item = fcItems[fcIdx];
  document.getElementById("fc-emoji").textContent = item.emoji;
  document.getElementById("fc-word").textContent = item.en;
  document.getElementById("fc-word-back").textContent = item.en;
  document.getElementById("fc-trans").textContent = item.jp;
  document.getElementById("fc-counter").textContent = `${fcIdx + 1} / ${fcItems.length}`;
  document.getElementById("flash-prog").textContent = `${fcIdx + 1} / ${fcItems.length}`;
}

document.getElementById("flashcard").addEventListener("click", () => {
  document.getElementById("flashcard").classList.toggle("flipped");
});
document.getElementById("fc-prev").addEventListener("click", () => {
  fcIdx = (fcIdx - 1 + fcItems.length) % fcItems.length;
  renderFlash();
});
document.getElementById("fc-next").addEventListener("click", () => {
  fcIdx = (fcIdx + 1) % fcItems.length;
  renderFlash();
});
document.getElementById("fc-shuffle").addEventListener("click", () => {
  fcItems = shuffle([...fcItems]);
  fcIdx = 0;
  renderFlash();
});
document.getElementById("flash-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// MATCHING
// ══════════════════════════════════════════════════════════
function startMatch(unitData) {
  matchScore = 0; matchTotal = 0; matchRound = 0; matchSelected = null;
  const pairs = unitData ? unitData.matchPairs : UNITS.filter(Boolean).flatMap(u => u.matchPairs);
  matchLeft = shuffle(pairs).slice(0, 6);
  matchTotal = matchLeft.length;
  renderMatchRound(matchLeft);
  showScreen("match-screen");
}

function renderMatchRound(pairs) {
  matchSelected = null;
  const lefts = shuffle(pairs.map(p => p[0]));
  const rights = shuffle(pairs.map(p => p[1]));
  document.getElementById("match-instructions").textContent = "英語と日本語を結びつけよう！";
  document.getElementById("match-score-text").textContent = `${matchScore} / ${matchTotal}`;
  document.getElementById("match-result").classList.add("hidden");
  document.getElementById("match-next-round").classList.add("hidden");

  const leftCol = document.getElementById("match-left");
  const rightCol = document.getElementById("match-right");
  leftCol.innerHTML = ""; rightCol.innerHTML = "";

  const pairMap = Object.fromEntries(pairs.map(p => [p[0], p[1]]));

  function makeItem(text, side, idx) {
    const el = document.createElement("button");
    el.className = "match-item";
    el.textContent = text;
    el.dataset.side = side;
    el.dataset.idx = idx;
    el.addEventListener("click", () => handleMatchClick(el, text, side, pairMap));
    return el;
  }

  lefts.forEach((t, i) => leftCol.appendChild(makeItem(t, "L", i)));
  rights.forEach((t, i) => rightCol.appendChild(makeItem(t, "R", i)));
}

function handleMatchClick(el, text, side, pairMap) {
  if (el.classList.contains("matched")) return;

  if (!matchSelected) {
    if (matchSelected && matchSelected.el === el) { el.classList.remove("selected"); matchSelected = null; return; }
    document.querySelectorAll(".match-item.selected").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
    matchSelected = { el, text, side };
    return;
  }

  if (matchSelected.side === side) {
    document.querySelectorAll(".match-item.selected").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
    matchSelected = { el, text, side };
    return;
  }

  // Attempt to match
  const L = side === "L" ? text : matchSelected.text;
  const R = side === "R" ? text : matchSelected.text;
  const isCorrect = pairMap[L] === R;

  if (isCorrect) {
    matchSelected.el.classList.remove("selected");
    matchSelected.el.classList.add("matched");
    el.classList.add("matched");
    matchScore++;
    document.getElementById("match-score-text").textContent = `${matchScore} / ${matchTotal}`;
    matchSelected = null;

    // Check if round complete
    const unmatched = document.querySelectorAll(".match-item:not(.matched)");
    if (unmatched.length === 0) {
      document.getElementById("match-result").textContent = "🎉 全部合っています！素晴らしい！";
      document.getElementById("match-result").classList.remove("hidden");
      document.getElementById("match-next-round").classList.remove("hidden");
    }
  } else {
    [matchSelected.el, el].forEach(e => {
      e.classList.add("wrong-flash");
      setTimeout(() => { e.classList.remove("wrong-flash","selected"); }, 700);
    });
    matchSelected = null;
  }
}

document.getElementById("match-next-round").addEventListener("click", () => {
  const unitData = currentUnitData;
  const pairs = unitData ? unitData.matchPairs : UNITS.filter(Boolean).flatMap(u => u.matchPairs);
  const newPairs = shuffle(pairs).slice(0, 6);
  matchTotal += newPairs.length;
  renderMatchRound(newPairs);
});
document.getElementById("match-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// SENTENCE BUILD
// ══════════════════════════════════════════════════════════
function startBuild(unitData) {
  buildItems = unitData
    ? [...unitData.sentences]
    : shuffle(UNITS.filter(Boolean).flatMap(u => u.sentences));
  buildIdx = 0; buildScore = 0; qResults = [];
  renderBuildQ();
  showScreen("build-screen");
}

function renderBuildQ() {
  const item = buildItems[buildIdx];
  const total = buildItems.length;
  document.getElementById("build-jp").textContent = item.jp;
  document.getElementById("build-prog").textContent = `${buildIdx + 1} / ${total}`;
  document.getElementById("build-prog-bar").style.width = `${(buildIdx / total) * 100}%`;
  document.getElementById("build-hint").classList.add("hidden");
  document.getElementById("build-feedback").classList.add("hidden");
  document.getElementById("build-check").disabled = true;

  buildAnswer = [];
  buildBank = shuffle([...item.words]);

  renderBuildBankAndAnswer(item);
}

function renderBuildBankAndAnswer(item) {
  const bankEl = document.getElementById("build-bank");
  const answerEl = document.getElementById("build-answer");

  bankEl.innerHTML = "";
  answerEl.innerHTML = "";

  // Show placeholder text via data attribute + CSS instead of moving a DOM node
  answerEl.dataset.empty = buildAnswer.length === 0 ? "true" : "false";

  buildBank.forEach((word, i) => {
    const chip = document.createElement("button");
    chip.className = "word-chip" + (buildAnswer.includes(i) ? " used" : "");
    chip.textContent = word;
    if (!buildAnswer.includes(i)) {
      chip.addEventListener("click", () => {
        buildAnswer.push(i);
        renderBuildBankAndAnswer(item);
        document.getElementById("build-check").disabled = buildAnswer.length !== buildBank.length;
      });
    }
    bankEl.appendChild(chip);
  });

  buildAnswer.forEach((bankIdx, pos) => {
    const chip = document.createElement("button");
    chip.className = "answer-chip";
    chip.textContent = buildBank[bankIdx];
    chip.addEventListener("click", () => {
      buildAnswer.splice(pos, 1);
      renderBuildBankAndAnswer(item);
      document.getElementById("build-check").disabled = buildAnswer.length !== buildBank.length;
    });
    answerEl.appendChild(chip);
  });
}

document.getElementById("build-check").addEventListener("click", () => {
  const item = buildItems[buildIdx];
  const userAns = buildAnswer.map(i => buildBank[i]).join(" ");
  const correct = userAns.toLowerCase() === item.words.join(" ").toLowerCase();
  if (correct) buildScore++;
  qResults.push({ item: { en: item.jp, emoji:"🧩" }, correct, chosen: userAns });

  // Lock all chips
  document.querySelectorAll(".word-chip, .answer-chip").forEach(c => { c.style.pointerEvents = "none"; });

  document.getElementById("build-hint").textContent = correct
    ? `✅ 正解！ → ${item.words.join(" ")}`
    : `❌ 正しい答え: ${item.words.join(" ")} 💡 ${item.hint}`;
  document.getElementById("build-hint").classList.remove("hidden");
  document.getElementById("build-hint").style.color = correct ? "#2E7D32" : "#F57F17";
  document.getElementById("build-hint").style.background = correct ? "#E8F5E9" : "#FFF8E1";
  document.getElementById("build-hint").style.borderColor = correct ? "#A5D6A7" : "#FFE082";

  document.getElementById("build-fb-icon").textContent = correct ? "⭕ 正解！" : "❌ 不正解";
  document.getElementById("build-feedback").classList.remove("hidden");
  document.getElementById("build-check").disabled = true;
});

document.getElementById("build-next").addEventListener("click", () => {
  buildIdx++;
  if (buildIdx >= buildItems.length) showReview("build");
  else renderBuildQ();
});
document.getElementById("build-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// REVIEW
// ══════════════════════════════════════════════════════════
function showReview(from) {
  const correct = qResults.filter(r => r.correct).length;
  const total = qResults.length;
  const pct = total ? Math.round((correct / total) * 100) : 0;

  document.getElementById("rv-pct").textContent = pct + "%";
  document.getElementById("rv-correct").textContent = correct;
  document.getElementById("rv-wrong").textContent = total - correct;
  document.getElementById("rv-total").textContent = total;
  document.getElementById("rv-grade").textContent =
    pct >= 90 ? "🌟 優秀！Excellent!" :
    pct >= 70 ? "😊 よくできました！Good job!" :
    pct >= 50 ? "📚 もう少し練習しよう！Keep trying!" :
    "💪 頑張れ！Practice more!";

  const list = document.getElementById("rv-list");
  list.innerHTML = "";
  qResults.forEach(r => {
    const row = document.createElement("div");
    row.className = "result-row";
    row.innerHTML = `
      <div class="result-q">${r.item.emoji || "📝"} ${r.item.en || r.item.jp || ""}</div>
      <div class="result-ans">${r.correct ? "⭕" : "❌"} ${r.chosen}</div>
    `;
    list.appendChild(row);
  });

  document.getElementById("rv-retry").onclick = () => {
    if (from === "quiz") startQuiz(currentUnitData);
    else startBuild(currentUnitData);
  };
  document.getElementById("rv-menu").onclick = () => showScreen("home-screen");
  showScreen("review-screen");
}

// ══════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
renderHome();

// Handle PWA shortcut URLs (?activity=vocab etc.)
(function handleShortcutURL() {
  const params = new URLSearchParams(location.search);
  const act = params.get('activity');
  if (act && Object.keys(ACTIVITY_DEFS).includes(act)) {
    launchActivity(act, null);
  }
})();
